name: Update TAPD Data

on:
  schedule:
    # 北京时间 8:00（UTC 0:00）
    - cron: '0 0 * * *'
    # 北京时间 12:00（UTC 4:00）
    - cron: '0 4 * * *'
    # 北京时间 18:00（UTC 10:00）
    - cron: '0 10 * * *'
    # 北京时间 21:00（UTC 13:00）
    - cron: '0 13 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write  # 授予写权限

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Update TAPD data
      env:
        TAPD_API_TOKEN: ${{ secrets.TAPD_API_TOKEN }}
        OUTPUT_FILE: ${{ github.workspace }}/data/tasks.json
      run: |
        cd scripts
        python3 fetch_tapd_tasks.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/tasks.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update TAPD data - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
